# Agentic System Configuration

# Controller settings
[controller]
max_concurrent_tasks = 100
task_timeout_seconds = 300
enable_external_help = true

# Worker settings
[workers]
# CPU Worker (llama.cpp)
[[workers.cpu]]
id = "workbox"
ip = "192.168.1.xxx"
pid = "/ws/.ai/envs/var/run/workbox.pid"
backend = "cpu"
model_path = "/models/UNKNOWN"
context_size = 4096
memory_gb = 
task_types = ["chat", "analysis", "file_operation", "thinking", "reasoning"]

# GPU Worker (Candle)
[[workers.gpu]]
id = "worker-gpu-01"
backend = "gpu"
model_path = "/models/UNKNOWN"
device = "cuda_13"
memory_gb = 24
task_types = ["code_generation", "model_inference", "architecture_design"]

# NPU Worker (OpenVINO)
[[workers.npu]]
id = "worker-npu-01"
backend = "npu"
model_path = "/models/UNKNOWN"
device = "NPU"
memory_gb = 10
task_types = ["model_inference", "image_ocr", "coordinator", "thinking"]

# External API configuration
[external_models]
enable_claude = true
enable_openai = true
fallback_to_external = true

[external_models.claude]
model = "claude-sonnet-4-20250514"
max_tokens = 4096
# API key should be set via ANTHROPIC_API_KEY env var

[external_models.openai]
model = "gpt-4"
max_tokens = 4096
# API key should be set via OPENAI_API_KEY env var

# Resource limits
[resources]
max_memory_per_worker_gb = 32
max_cpu_percent = 80
max_gpu_memory_gb = 24

# Task scheduling
[scheduling]
strategy = "least_loaded"  # Options: least_loaded, round_robin, priority
enable_task_dependencies = true
max_retries = 3

# Logging
[logging]
level = "info"  # Options: trace, debug, info, warn, error
format = "json"  # Options: json, pretty
log_to_file = true
log_file_path = "/var/log/agentic-system.log"

# Distributed settings
[distributed]
enable = true
coordinator_host = "localhost"
coordinator_port = 8080
heartbeat_interval_seconds = 30

# Crate builder settings
[crate_builder]
workspace_root = "./workspace"
auto_compile = true
run_tests_before_deploy = true
