version: '3.8'

services:
  # Vector Database for RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openhwy-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama for LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: openhwy-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # llama.cpp server (alternative to Ollama)
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: openhwy-llama-cpp
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command:
      - "--model"
      - "/models/qwen2.5-7b-instruct.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-c"
      - "4096"
    restart: unless-stopped
    # Uncomment for GPU support:
    # environment:
    #   - LLAMA_CUDA=1
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # DragonflyDB for pub/sub and caching (Redis-compatible)
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: openhwy-dragonfly
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    command:
      - "--logtostderr"
      - "--requirepass=change-me-in-production"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Marketeer - Edge Router (Build locally)
  marketeer:
    build:
      context: ./source
      dockerfile: Dockerfile.marketeer
    container_name: openhwy-marketeer
    ports:
      - "8000:8000"
    environment:
      - MARKETEER_LISTEN_ADDR=0.0.0.0
      - MARKETEER_LISTEN_PORT=8000
      - CODRIVER_URL=http://codriver:8001
      - RUST_LOG=info
    volumes:
      - ./source/config:/app/config:ro
    depends_on:
      - codriver
    restart: unless-stopped

  # Co-Driver - API Gateway (Build locally)
  codriver:
    build:
      context: ./source
      dockerfile: Dockerfile.codriver
    container_name: openhwy-codriver
    ports:
      - "8001:8001"
    environment:
      - CODRIVER_LISTEN_ADDR=0.0.0.0
      - CODRIVER_LISTEN_PORT=8001
      - OLLAMA_URL=http://ollama:11434
      - LLAMA_CPP_URL=http://llama-cpp:8080
      - QDRANT_URL=http://qdrant:6333
      - RUST_LOG=info
    volumes:
      - ./source/config:/app/config:ro
    depends_on:
      - qdrant
      - ollama
      - llama-cpp
    restart: unless-stopped

  # PostgreSQL (Optional - for persistent storage)
  postgres:
    image: postgres:16-alpine
    container_name: openhwy-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=openhwy
      - POSTGRES_PASSWORD=change-me-in-production
      - POSTGRES_DB=openhwy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - full

volumes:
  qdrant_data:
    driver: local
  ollama_models:
    driver: local
  dragonfly_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: openhwy-network
