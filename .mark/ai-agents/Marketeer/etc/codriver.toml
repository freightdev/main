# Co-Driver Configuration - API Gateway & Orchestrator

listen_addr = "0.0.0.0"
listen_port = 8001

# LLM Backends
ollama_url = "http://localhost:11434"
llama_cpp_url = "http://localhost:8080"

# RAG System
qdrant_url = "http://localhost:6333"

# Known Agents
[[agents]]
name = "big-bear"
url = "http://localhost:3003"
capabilities = ["weather", "traffic", "weigh-stations"]
enabled = true

[[agents]]
name = "cargo-connect"
url = "http://localhost:3004"
capabilities = ["load-board", "load-scoring", "load-filtering"]
enabled = true

[[agents]]
name = "legal-logger"
url = "http://localhost:3005"
capabilities = ["document-encryption", "audit-logging"]
enabled = true

[[agents]]
name = "packet-pilot"
url = "http://localhost:3006"
capabilities = ["document-processing", "form-filling", "pdf-generation"]
enabled = true

[[agents]]
name = "trucker-tales"
url = "http://localhost:3007"
capabilities = ["story-collection", "publishing"]
enabled = false

[[agents]]
name = "whisper-witness"
url = "http://localhost:3008"
capabilities = ["call-recording", "transcription", "broker-tactic-detection"]
enabled = false

[logging]
level = "info"
format = "json"

[performance]
max_concurrent_requests = 100
request_timeout_seconds = 30
