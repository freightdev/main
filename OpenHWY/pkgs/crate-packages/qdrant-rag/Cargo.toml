[package]
name = "qdrant-rag"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "Production-ready Qdrant RAG system for semantic code search"
license = "MIT"

[dependencies]
# Qdrant client
qdrant-client = "1.7"

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# HTTP client for embeddings
reqwest = { version = "0.11", features = ["json"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Config
config = "0.14"
dotenv = "0.15"

# File system operations
walkdir = "2.4"
ignore = "0.4"

# Code parsing
tree-sitter = "0.20"
tree-sitter-rust = "0.20"

# Text processing
regex = "1.10"
unicode-segmentation = "1.11"

# Hashing for deduplication
blake3 = "1.5"

[dev-dependencies]
tempfile = "3.8"
pretty_assertions = "1.4"

[lib]
name = "qdrant_rag"
path = "src/lib.rs"

[[example]]
name = "index_codebase"
path = "examples/index_codebase.rs"

[[example]]
name = "search_demo"
path = "examples/search_demo.rs"
