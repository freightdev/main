[package]
name = "mcp-rust"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "Model Context Protocol implementation in Rust for distributed agent communication"
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }

# HTTP server/client
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace", "compression"] }
hyper = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Validation
validator = { version = "0.18", features = ["derive"] }

# UUID generation
uuid = { version = "1.6", features = ["v4", "serde"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging/tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Config
config = "0.14"
dotenv = "0.15"

# Service discovery (optional)
etcd-client = { version = "0.12", optional = true }

# Health checks
tokio-util = "0.7"

# Rate limiting
governor = "0.6"

# Metrics (optional)
prometheus = { version = "0.13", optional = true }

[dev-dependencies]
tempfile = "3.8"
httpmock = "0.7"

[features]
default = []
discovery = ["etcd-client"]
metrics = ["prometheus"]

[lib]
name = "mcp_rust"
path = "src/lib.rs"

[[example]]
name = "agent_server"
path = "examples/agent_server.rs"

[[example]]
name = "agent_client"
path = "examples/agent_client.rs"
