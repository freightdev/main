# MCP Server Configuration

[server]
name = "my-agent"
host = "0.0.0.0"
port = 3000
description = "My MCP Agent"

[security]
auth_enabled = true
auth_token = "${MCP_AUTH_TOKEN}"  # Set via environment variable
cors_origins = ["http://localhost:3000", "http://localhost:3001"]
use_tls = false
# cert_path = "/path/to/cert.pem"
# key_path = "/path/to/key.pem"

# Known agents in the system
[[agents.known]]
name = "co-driver"
url = "http://localhost:3001"
capabilities = ["orchestration", "task-routing", "agent-management"]
enabled = true
# auth_token = "${CO_DRIVER_TOKEN}"

[[agents.known]]
name = "marketeer"
url = "http://localhost:3002"
capabilities = ["security", "routing", "marking"]
enabled = true

[[agents.known]]
name = "big-bear"
url = "http://localhost:3003"
capabilities = ["weigh-station-tracking", "weather-alerts", "traffic-monitoring"]
enabled = true

[[agents.known]]
name = "cargo-connect"
url = "http://localhost:3004"
capabilities = ["load-board-integration", "load-scoring", "load-filtering"]
enabled = false

[[agents.known]]
name = "legal-logger"
url = "http://localhost:3005"
capabilities = ["document-encryption", "audit-logging", "signatures"]
enabled = false

[[agents.known]]
name = "packet-pilot"
url = "http://localhost:3006"
capabilities = ["document-processing", "form-filling", "pdf-generation"]
enabled = false

# Service Discovery (Optional)
[discovery]
enabled = false
type = "etcd"  # Options: etcd, consul, manual
etcd_endpoints = ["http://localhost:2379"]
registry_ttl_seconds = 60
heartbeat_interval_seconds = 30

# DragonflyDB Integration (Optional)
[integrations.dragonfly]
enabled = false
host = "localhost"
port = 6379
channel_prefix = "mcp:"
subscribe_channels = ["agents:*", "tasks:*", "events:*"]
publish_heartbeat = true

# Marketeer Integration (Optional)
[integrations.marketeer]
enabled = false
url = "http://localhost:8000"
api_key = "${MARKETEER_API_KEY}"
verify_all_requests = true

# Firecracker VM Integration (Optional)
[integrations.firecracker]
enabled = false
socket_path = "/var/run/firecracker.sock"
vm_id_prefix = "mcp-agent"

[performance]
max_connections = 1000
request_timeout_seconds = 30
rate_limit_per_second = 100
connection_pool_size = 100

[logging]
level = "info"  # Options: trace, debug, info, warn, error
format = "json"  # Options: json, pretty
# log_file = "logs/mcp-server.log"
