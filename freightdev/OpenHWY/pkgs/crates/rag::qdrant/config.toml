# Qdrant RAG Configuration

[qdrant]
host = "localhost"
port = 6333
# api_key = ""  # Optional: Uncomment if using Qdrant Cloud
use_tls = false
timeout_seconds = 30

[collection]
name = "codebase"
vector_size = 1536  # Must match embedding model dimension
distance_metric = "Cosine"  # Options: Cosine, Euclid, Dot
on_disk_payload = false

[embedding]
provider = "anthropic"  # Options: openai, anthropic, ollama, local
model = "voyage-2"
# api_key = "${EMBEDDING_API_KEY}"  # Set via environment variable
# api_url = "https://api.anthropic.com/v1/embeddings"
batch_size = 100
rate_limit_per_minute = 1000
max_retries = 3
timeout_seconds = 60

# For local models
# [embedding.local]
# model_path = "/path/to/model"
# device = "cuda"  # Options: cpu, cuda, mps

[indexing]
root_path = "../../"
include_patterns = [
    "**/*.rs",
    "**/*.toml",
    "**/*.md",
    "**/*.txt",
]
exclude_patterns = [
    "**/target/**",
    "**/node_modules/**",
    "**/.git/**",
    "**/dist/**",
    "**/build/**",
]
max_file_size_mb = 10
parallel_workers = 4

[chunking]
strategy = "semantic"  # Options: semantic, fixed, adaptive
size = 512
overlap = 50
min_size = 100
max_size = 2048
respect_boundaries = ["function", "impl", "struct", "enum", "mod"]

[search]
top_k = 10
score_threshold = 0.7
with_payload = true
with_vectors = false
rerank = false
hybrid_search = false

# Optional: Add search filters
# [search.filters]
# file_types = ["rs", "toml"]
# paths = ["lib/ai-crates/**"]
# exclude_paths = ["**/tests/**"]

[performance]
max_concurrent_requests = 10
connection_pool_size = 10
cache_embeddings = true
cache_ttl_seconds = 3600
prefetch_enabled = true

[metadata]
include_git_info = false
include_file_stats = true
include_syntax_tree = false
custom_tags = []

# Add external repositories to index
[[repositories.external]]
name = "agent-templates"
path = "/path/to/agent/templates"
enabled = false

[[repositories.external]]
name = "shared-crates"
path = "/path/to/shared/crates"
enabled = false

[logging]
level = "info"  # Options: trace, debug, info, warn, error
format = "json"  # Options: json, pretty
# log_file = "logs/qdrant-rag.log"
